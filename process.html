<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>National QR Livestock · FMD‑negative digital IDs</title>
    <!-- Fonts, Icons, AOS, Leaflet -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f4f7fc; color: #0b1a2a; line-height: 1.5; }
        :root { --primary: #bc1c2e; --primary-dark: #9f1626; --success: #117f3a; --warning: #b85e00; --info: #2563eb; --neutral-900: #0f172a; --neutral-800: #1e293b; --gray-200: #e9edf2; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }

        /* header */
        .header { position: fixed; width: 100%; top: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .navbar { display: flex; justify-content: space-between; align-items: center; height: 80px; }
        
        .logo-text span.text-red { color: var(--primary); }
        .nav-menu { display: flex; gap: 2rem; list-style: none; transition: all 0.3s ease; }
        .nav-link { text-decoration: none; color: var(--neutral-800); font-weight: 500; }
        .btn { padding: 0.5rem 1.2rem; border-radius: 40px; text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 0.6rem; transition: 0.2s; cursor: pointer; border: none; font-size: 1rem; }
        .btn-primary { background: var(--primary); color: white; border: 1px solid var(--primary); }
        .btn-outline { border: 1px solid var(--primary); color: var(--primary); background: transparent; }

        /* Logo styles - ADD THESE (they're missing in your current file) */
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }
        .logo-img {
            height: 80px;
            width: auto;
            border-radius: 8px;
            transition: transform 0.2s ease;
        }
        .logo:hover .logo-img {
            transform: scale(1.05);
        }
        .logo-full { display: inline; }
        .logo-short { display: none; }
        .logo-text {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.02em;
        }
        .logo-text .text-red {
            color: #bc1c2e;
        }
        
        @media (max-width: 900px) {
            .logo-text { font-size: 1.4rem; }
        }
        @media (max-width: 700px) {
            .logo-text { font-size: 1.2rem; }
            .logo-full { display: none; }
            .logo-short { display: inline; }
        }
        @media (max-width: 480px) {
            .logo-text { font-size: 1rem; }
            .logo-img { height: 40px; }
        }

        /* HERO */
        .hero { position: relative; padding: 130px 0 70px; background: linear-gradient(165deg, #ffffff 0%, #f0f5fa 100%); overflow: hidden; }
        .hero-grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 3rem; align-items: start; }
        @media (max-width:900px){ .hero-grid { grid-template-columns:1fr; } }
        .hero-badge { display: inline-flex; background: rgba(188,28,46,0.08); padding: 0.4rem 1.2rem; border-radius: 40px; color: var(--primary-dark); font-weight: 600; margin-bottom: 1.5rem; border: 1px solid rgba(188,28,46,0.15); }
        .badge-pulse { width: 10px; height: 10px; background: var(--primary); border-radius: 50%; margin-right: 0.6rem; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.3); } }
        .hero-title { font-size: 3.2rem; font-weight: 800; line-height: 1.2; letter-spacing: -0.02em; color: #0b1a2a; }
        @media (max-width:640px){ .hero-title{font-size:2.4rem;} }
        .text-gradient-red { background: linear-gradient(145deg, #bc1c2e, #8e1422); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-description { font-size: 1.2rem; color: #2d3c4b; max-width: 90%; margin: 1.5rem 0 2rem; }
        .stat-banner { display: flex; gap: 2rem; background: white; border-radius: 60px; padding: 1rem 2rem; box-shadow: 0 10px 20px -10px rgba(0,0,0,0.1); width: fit-content; margin: 2rem 0; border: 1px solid #dfe7ef; flex-wrap:wrap; }
        .stat-item { display: flex; flex-direction: column; }
        .stat-value { font-size: 2rem; font-weight: 800; color: #0f172a; }
        .stat-label { color: #475569; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }

        /* QR step visual card */
        .visual-card { background: white; border-radius: 40px; box-shadow: 0 30px 50px -25px rgba(0,40,80,0.3); padding: 2rem; border: 1px solid rgba(188,28,46,0.1); position: relative; }
        .qr-step-ribbon { position: absolute; top: -12px; left: 30px; background: var(--primary); color: white; padding: 0.4rem 1.4rem; border-radius: 40px; font-weight: 600; font-size: 0.9rem; box-shadow: 0 8px 14px rgba(188,28,46,0.3); }
        .step-visual-flow { display: flex; flex-direction: column; gap: 1.8rem; margin-top: 1.5rem; }
        .step-item { display: flex; align-items: center; gap: 1.2rem; background: #f9fcff; padding: 1rem 1.5rem; border-radius: 100px; border: 1px solid #dee7f0; transition: all 0.2s; flex-wrap:wrap; }
        .step-item .step-icon { width: 56px; height: 56px; background: #f1f6fb; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #e2ebf6; flex-shrink:0; }
        .step-item .step-content h4 { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 0.3rem; flex-wrap:wrap; }
        .step-content .badge-success { background: #e0f2e9; color: #0a7143; padding: 0.2rem 0.8rem; border-radius: 40px; font-size: 0.7rem; font-weight: 700; margin-left: 0.5rem; }
        .step-content p { color: #2f4b6e; margin-top: 0.2rem; font-size: 0.95rem; }
        .qr-tag-preview { display: flex; align-items: center; gap: 1.5rem; background: #0b1f33; color: white; border-radius: 80px; padding: 0.8rem 1.8rem; margin-top: 0.5rem; border: 2px solid white; box-shadow: 0 14px 24px -8px black; flex-wrap:wrap; }
        .qr-tag-preview i { font-size: 2.6rem; color: white; background: #1f3a57; padding: 0.5rem; border-radius: 20px; }
        .qr-tag-preview .tag-detail span { font-size: 0.8rem; opacity: 0.7; }
        .qr-tag-preview .tag-detail strong { font-size: 1.2rem; font-weight: 700; display: flex; gap: 0.8rem; align-items: center; flex-wrap:wrap; }
        .status-negative { background: #00a86b; color: white; padding: 0.2rem 0.9rem; border-radius: 60px; font-size: 0.8rem; font-weight: 700; margin-left: 0.5rem; }

        /* mini map */
        .map-mini-container { margin-top: 2rem; border-radius: 28px; overflow: hidden; border: 1px solid #d4e0ec; background: #14283c; height: 140px; position: relative; }
        #miniLivestockMap { width: 100%; height: 100%; z-index: 1; }
        .map-badge { position: absolute; bottom: 8px; left: 12px; background: rgba(0,0,0,0.6); color: white; font-size: 0.7rem; padding: 0.2rem 0.8rem; border-radius: 40px; backdrop-filter: blur(4px); z-index: 10; }

        /* process grid */
        .section-header { text-align: center; margin: 4rem 0 3rem; }
        .section-tag { background: rgba(188,28,46,0.08); color: var(--primary-dark); padding: 0.3rem 1rem; border-radius: 60px; font-weight: 600; font-size: 0.9rem; display:inline-block; }
        .subsection-title { font-size: 2rem; font-weight: 700; margin: 1rem 0 1.5rem; }
        .process-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1.5rem; margin: 3rem 0; }
        @media (max-width:1000px){ .process-grid { grid-template-columns:repeat(2,1fr); } }
        @media (max-width:600px){ .process-grid { grid-template-columns:1fr; } }
        .process-card { background: white; border-radius: 32px; padding: 1.8rem 1.2rem; box-shadow: 0 12px 24px -16px rgba(0,0,0,0.1); border: 1px solid #deecf5; }
        .process-icon { width: 70px; height: 70px; background: #f1f6fb; border-radius: 30px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 1.5rem; }
        .process-card h4 { font-weight: 700; margin-bottom: 0.5rem; }
        .process-card p { color: #395c7c; font-size: 0.95rem; }

        /* FMD Images Gallery */
        .fmd-gallery { margin: 4rem 0; background: white; border-radius: 40px; padding: 2rem; box-shadow: 0 20px 30px -10px rgba(0,0,0,0.1); }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; margin-top: 2rem; }
        .gallery-item { border-radius: 16px; overflow: hidden; aspect-ratio: 1; border: 2px solid #e9edf2; transition: transform 0.2s; cursor: pointer; }
        .gallery-item:hover { transform: scale(1.02); border-color: var(--primary); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .gallery-title { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap:wrap; }
        .gallery-title h3 { font-size: 1.8rem; font-weight: 700; }
        .gallery-badge { background: var(--primary); color: white; padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.9rem; }

        .dashboard-peek { background: #f8fbff; border-radius: 40px; padding: 2rem; margin: 4rem 0; }
        .dashboard-image { width: 100%; border-radius: 24px; border: 1px solid #cbdae9; box-shadow: 0 20px 30px -10px rgba(0,0,0,0.15); display: block; }
        .footer { background: #0f172a; color: white; padding: 3rem 0; margin-top: 4rem; }

        img { background: #d1ddee; display: block; max-width:100%; height:auto; }
        .hero-image-placeholder { width: 100%; height: 100%; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .hero-image-placeholder img { width: 100%; height: 100%; object-fit: cover; }

        /* camera modal */
        .camera-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(8px); z-index:2000; align-items:center; justify-content:center; }
        .camera-card { max-width:600px; width:90%; background:#0b1f33; border-radius:48px; padding:1.5rem; box-shadow:0 30px 60px rgba(0,0,0,0.6); border:2px solid var(--primary); }
        .camera-header { display:flex; justify-content:space-between; align-items:center; color:white; margin-bottom:1rem; }
        .camera-header h3 { font-weight:600; display:flex; gap:0.5rem; }
        #closeCamera { background:transparent; border:none; color:#ffb4b4; font-size:2rem; cursor:pointer; line-height:1; }
        #cameraFeed { width:100%; border-radius:32px; background:#1f3a57; min-height:300px; object-fit:cover; border:2px solid var(--primary); transform:scaleX(-1); }
        .camera-placeholder { background:#102b3f; border-radius:32px; display:flex; align-items:center; justify-content:center; color:white; min-height:300px; border:2px dashed var(--primary); font-size:1.2rem; flex-direction:column; gap:1rem; }
        .mock-scan-line { width:80%; height:4px; background:var(--primary); opacity:0.7; animation:scan 2s infinite; }
        @keyframes scan { 0% { transform:translateY(-30px); } 50% { transform:translateY(30px); } }
        .permission-hint { color:#aaa; font-size:0.9rem; margin-top:1rem; }

        /* ========== MOBILE DROPDOWN (hamburger) ========== */
        .nav-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
            background: none;
            border: none;
            padding: 8px;
            margin-left: 8px;
            z-index: 1100;
        }
        .nav-toggle span {
            width: 24px;
            height: 2px;
            background: var(--neutral-800);
            margin: 3px 0;
            transition: 0.3s;
            border-radius: 2px;
        }
        .nav-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(6px, 6px); }
        .nav-toggle.active span:nth-child(2) { opacity: 0; }
        .nav-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(6px, -6px); }

        @media (max-width: 700px) {
            .nav-menu {
                position: fixed;
                top: 80px;
                left: 0;
                right: 0;
                background: white;
                flex-direction: column;
                align-items: center;
                gap: 0;
                padding: 0;
                max-height: 0;
                overflow: hidden;
                box-shadow: 0 10px 20px rgba(0,0,0,0.1);
                border-radius: 0 0 24px 24px;
                transition: max-height 0.4s ease, padding 0.3s ease;
                z-index: 999;
                pointer-events: none;
            }
            .nav-menu.active {
                max-height: 300px;
                padding: 1rem 0;
                pointer-events: all;
                border-bottom: 2px solid var(--primary);
            }
            .nav-menu li {
                width: 100%;
                text-align: center;
                opacity: 0;
                transform: translateY(-10px);
                transition: opacity 0.3s ease 0.1s, transform 0.3s ease 0.1s;
            }
            .nav-menu.active li {
                opacity: 1;
                transform: translateY(0);
            }
            .nav-menu .nav-link {
                display: block;
                padding: 0.9rem 1rem;
                font-size: 1.1rem;
                border-bottom: 1px solid #f0f0f0;
                width: 100%;
            }
            .nav-menu li:last-child .nav-link { border-bottom: none; }
            .nav-toggle { display: flex; }
            .navbar { height: 70px; }
        }
    </style>
</head>
