[build]
  # Left empty because Vanilla JS doesn't need to be built/compiled
  command = ""
  publish = "."
  functions = "netlify/functions"

[functions]
  # Enable blobs for your specific function
  [functions."save-animal"]
    blobs = true

# Development server settings
[dev]
  framework = "#static"
  command = "npx serve ."
  port = 8888
  targetPort = 8888

# Redirects for clean URLs
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200